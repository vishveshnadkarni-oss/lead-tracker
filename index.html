<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Lead Tracker – BFL OEM v2.5</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --accent: #f5c842;
  --accent2: #e8a020;
  --text: #e8eaf0;
  --muted: #7c82a0;
  --green: #3ecf8e;
  --red: #f66;
  --blue: #5b8df5;
  --orange: #f5934a;
  --radius: 12px;
  --font: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }

/* NAV */
.nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--accent); letter-spacing: -0.3px; }
.nav-brand span { color: var(--muted); font-size: 11px; display: block; font-family: var(--font); font-weight: 400; letter-spacing: 0; }
.nav-actions { display: flex; gap: 8px; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 500; transition: all .15s; }
.btn-primary { background: var(--accent); color: #111; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 8px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; font-size: 16px; }
.btn-icon:hover { color: var(--accent); border-color: var(--accent); }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 16px; overflow-x: auto; }
.tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all .15s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* MAIN */
.main { padding: 16px; max-width: 900px; margin: 0 auto; }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
@media (min-width: 600px) { .stats { grid-template-columns: repeat(4, 1fr); } }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat-val { font-size: 24px; font-weight: 600; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

/* FILTERS */
.filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 10px; font-family: var(--font); font-size: 13px; flex: 1; min-width: 120px; }
.search-box { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 12px; font-family: var(--font); font-size: 13px; flex: 2; min-width: 140px; }
.search-box::placeholder { color: var(--muted); }

/* LEAD CARDS */
.leads-list { display: flex; flex-direction: column; gap: 10px; }
.lead-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all .15s; position: relative; }
.lead-card:hover { border-color: var(--accent); }
.lead-card.overdue { border-left: 3px solid var(--red); }
.lead-card.due-today { border-left: 3px solid var(--orange); }
.lead-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.lead-company { font-size: 15px; font-weight: 600; color: var(--text); }
.lead-customer { font-size: 12px; color: var(--muted); margin-top: 2px; }
.lead-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.tag { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.tag-stage { background: #1e2a4a; color: var(--blue); }
.tag-priority-high { background: #3a1a1a; color: var(--red); }
.tag-priority-medium { background: #3a2a10; color: var(--orange); }
.tag-priority-low { background: #1a2a1a; color: var(--green); }
.tag-oem { background: var(--surface2); color: var(--muted); }
.tag-amount { background: #2a2210; color: var(--accent); }
.lead-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.lead-followup { font-size: 11px; }
.lead-followup.overdue { color: var(--red); }
.lead-followup.due-today { color: var(--orange); }
.lead-followup.upcoming { color: var(--green); }
.lead-followup.none { color: var(--muted); }
.lead-age { font-size: 11px; color: var(--muted); }

/* BADGE */
.status-badge { padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.status-active { background: #0d2b1f; color: var(--green); }
.status-lost { background: #2b0d0d; color: var(--red); }
.status-hold { background: #2b2010; color: var(--orange); }
.status-won { background: #102b20; color: #6effc2; }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; max-height: 92vh; overflow-y: auto; padding: 20px; animation: slideUp .2s ease; }
@media (min-width: 640px) { .overlay { align-items: center; } .modal { border-radius: 20px; max-height: 88vh; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); margin-bottom: 18px; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 12px; font-family: var(--font); font-size: 14px; width: 100%; transition: border .15s; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
select option { background: var(--bg); }
textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 10px; margin-top: 18px; }
.form-actions .btn { flex: 1; justify-content: center; }

/* SETTINGS PANEL */
.settings-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
.settings-panel h3 { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.settings-note { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
.settings-note a { color: var(--blue); }

/* DETAIL VIEW */
.detail-section { margin-bottom: 16px; }
.detail-section h4 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 8px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.detail-item label { font-size: 10px; color: var(--muted); display: block; }
.detail-item span { font-size: 14px; color: var(--text); }
.detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }

/* TOAST */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 30px; font-size: 13px; font-weight: 500; z-index: 500; display: none; animation: fadeIn .2s; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
.toast.show { display: block; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* SYNC INDICATOR */
.sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: var(--muted); }
.sync-dot.ok { background: var(--green); }
.sync-dot.err { background: var(--red); }
.sync-dot.syncing { background: var(--orange); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

/* EMPTY STATE */
.empty { text-align: center; padding: 48px 16px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty p { color: var(--muted); font-size: 13px; }

/* SHARE MODAL */
.share-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--muted); white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; line-height: 1.6; }

/* IMPORT */
.import-drop { border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all .2s; margin-top: 12px; }
.import-drop:hover, .import-drop.drag { border-color: var(--accent); background: rgba(245,200,66,.04); }
.import-drop p { color: var(--muted); font-size: 13px; margin-top: 6px; }
.import-preview-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
.import-preview-table th { background: var(--surface2); color: var(--muted); padding: 6px 8px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
.import-preview-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
.import-preview-table tr:nth-child(even) td { background: rgba(255,255,255,.02); }
.import-row-ok td:first-child { border-left: 3px solid var(--green); }
.import-row-dup td:first-child { border-left: 3px solid var(--orange); }
.import-row-err td:first-child { border-left: 3px solid var(--red); }
.import-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 11px; color: var(--muted); }
.import-legend span::before { content: '■ '; }
.ok-dot::before { color: var(--green); }
.dup-dot::before { color: var(--orange); }
.err-dot::before { color: var(--red); }
.import-scroll { max-height: 260px; overflow: auto; border: 1px solid var(--border); border-radius: 8px; }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- NAV -->
<div class="nav">
  <div class="nav-brand">
    LeadTrack
    <span>BFL OEM South India</span>
  </div>
  <div class="nav-actions">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
    <button class="btn-icon" onclick="openSettings()" title="Settings">⚙️</button>
    <button class="btn btn-primary" onclick="openAddLead()">+ Add</button>

</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="setTab('all',this)">All Leads</div>
  <div class="tab" onclick="setTab('followup',this)">Follow-up Due</div>
  <div class="tab" onclick="setTab('active',this)">Active</div>

</div>

<!-- MAIN -->
<div class="main" id="mainContent">
  <!-- rendered by JS -->
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="formOverlay" onclick="closeFormModal(event)">
  <div class="modal">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button onclick="closeForm()" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0;line-height:1;">←</button>
      <div class="modal-title" id="formTitle" style="margin-bottom:0">Add Lead</div>
    </div>
    <div class="form-grid" id="leadForm">

      <div class="form-group">
        <label>Phone Number *</label>

      <div class="form-group form-full">
        <label>Email</label>

      <div class="form-group">
        <label>Location / City</label>

      <div class="form-group">

    <div id="importBody">
      <!-- filled by JS -->

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let leads = [];
let editingId = null;
let currentTab = 'all';
let ghFileSHA = null;

const STORAGE_KEY = 'lt_leads_local';
const SETTINGS_KEY = 'lt_gh_settings';
const LAST_BACKUP_KEY = 'lt_last_backup_date';

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }
function daysBetween(a, b) {
  const da = new Date(a), db = new Date(b);
  return Math.round((db - da) / 86400000);
}
function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function fmtAmt(n) {
  if (!n) return '—';
  const num = parseInt(n);
  if (num >= 10000000) return `₹${(num/10000000).toFixed(2)}Cr`;
  if (num >= 100000) return `₹${(num/100000).toFixed(1)}L`;
  return `₹${num.toLocaleString('en-IN')}`;
}
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', 2500);
}

// ─────────────────────────────────────────
// GITHUB SETTINGS
// ─────────────────────────────────────────
function getSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

// ─────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────
async function ghRequest(method, path, body) {
  const s = getSettings();
  if (!s.token || !s.owner || !s.repo) return null;
  const res = await fetch(`https://api.github.com${path}`, {
    method,
    headers: {
      'Authorization': `token ${s.token}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(`GitHub ${res.status}: ${res.statusText}`);
  return res.json();
}

async function loadFromGithub() {
  const s = getSettings();
  if (!s.token) return false;
  const filePath = s.filePath || 'leads.json';
  setSyncDot('syncing');
  try {
    const data = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/${filePath}`);
    ghFileSHA = data.sha;
    // Handle empty file
    const raw = data.content ? data.content.replace(/\n/g,'') : '';
    if (!raw) { setSyncDot('ok'); return true; }
    let decoded;
    try { decoded = atob(raw); } catch(e) { throw new Error('Could not decode file'); }
    if (!decoded.trim()) { setSyncDot('ok'); return true; }
    let parsed;
    try { parsed = JSON.parse(decoded); } catch(e) { throw new Error('File is corrupted – resetting'); }
    if (Array.isArray(parsed)) leads = parsed;
    saveLocal(leads);
    setSyncDot('ok');
    return true;
  } catch(e) {
    if (e.message.includes('404')) {
      ghFileSHA = null;
      setSyncDot('ok');
      return true;
    }
    // Corrupted file — delete SHA so next save recreates it cleanly
    if (e.message.includes('corrupted')) {
      ghFileSHA = null;
      setSyncDot('err');
      toast('Remote file was corrupted. Save a lead to recreate it.', 'error');
      return false;
    }
    setSyncDot('err');
    toast('GitHub sync failed: ' + e.message, 'error');
    return false;
  }
}

async function getLatestSHA() {
  // Always fetch latest SHA before writing to avoid conflicts
  const s = getSettings();
  const filePath = s.filePath || 'leads.json';
  try {
    const data = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/${filePath}`);
    return data.sha;
  } catch(e) {
    return null; // file doesn't exist yet
  }
}

async function saveToGithub() {
  const s = getSettings();
  if (!s.token) return;
  const filePath = s.filePath || 'leads.json';
  setSyncDot('syncing');
  try {
    // Always get the latest SHA before writing to avoid stale SHA conflicts
    const latestSHA = await getLatestSHA();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(leads, null, 2))));
    const body = {
      message: `Update leads – ${new Date().toLocaleString('en-IN')}`,
      content,
      ...(latestSHA ? { sha: latestSHA } : {})
    };
    const res = await ghRequest('PUT', `/repos/${s.owner}/${s.repo}/contents/${filePath}`, body);
    ghFileSHA = res.content.sha;
    setSyncDot('ok');
    toast('Saved to GitHub ✓', 'success');
  } catch(e) {
    setSyncDot('err');
    toast('GitHub save failed: ' + e.message, 'error');
  }
}

function saveLocal(data) {
  const json = JSON.stringify(data);
  try { localStorage.setItem(STORAGE_KEY, json); } catch(e) { console.warn('localStorage write failed:', e); }
  try { sessionStorage.setItem(STORAGE_KEY, json); } catch(e) {}
}

function loadLocal() {
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    if (ls) return JSON.parse(ls);
  } catch(e) { console.warn('localStorage read failed:', e); }
  try {
    const ss = sessionStorage.getItem(STORAGE_KEY);
    if (ss) return JSON.parse(ss);
  } catch(e) {}
  return [];
}

function setSyncDot(state) {
  const el = document.getElementById('syncDot');
  el.className = `sync-dot ${state}`;
  el.title = state === 'ok' ? 'Synced' : state === 'err' ? 'Sync error' : 'Syncing...';
}

// ─────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────
function mergeLeads(localArr, remoteArr) {
  // Combine both arrays; newer updatedAt wins per ID; leads only on one side are kept
  const map = {};
  remoteArr.forEach(l => { if (l.id) map[l.id] = l; });
  localArr.forEach(l => {
    if (!l.id) return;
    if (!map[l.id]) { map[l.id] = l; }
    else {
      const rDate = new Date(map[l.id].updatedAt || 0);
      const lDate = new Date(l.updatedAt || 0);
      if (lDate >= rDate) map[l.id] = l;
    }
  });
  return Object.values(map).sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
}

async function initApp() {
  // Always show local data immediately — never flash zero
  const localLeads = loadLocal();
  leads = localLeads;
  render();

  const s = getSettings();
  if (!s.token) return;

  // Always silently pull from GitHub on every open and merge
  setSyncDot('syncing');
  const filePath = s.filePath || 'leads.json';
  try {
    const data = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/${filePath}`);
    ghFileSHA = data.sha;
    const raw = data.content ? data.content.replace(/\n/g,'') : '';
    let remoteLeads = [];
    if (raw) {
      try { remoteLeads = JSON.parse(atob(raw)) || []; } catch(e) { remoteLeads = []; }
    }
    const merged = mergeLeads(localLeads, remoteLeads);
    // Only re-render if data actually changed
    const changed = merged.length !== localLeads.length ||
      merged.some((l,i) => !localLeads[i] || l.id !== localLeads[i].id || l.updatedAt !== localLeads[i].updatedAt);
    leads = merged;
    saveLocal(leads);
    setSyncDot('ok');
    if (changed) {
      document.getElementById('mainContent').innerHTML = '';
      render();
    }
    // Push local-only leads to GitHub
    if (localLeads.some(l => !remoteLeads.find(r => r.id === l.id))) {
      await saveToGithub();
    }
    setTimeout(runDailyBackup, 3000);
  } catch(e) {
    if (e.message.includes('404')) { ghFileSHA = null; setSyncDot('ok'); return; }
    setSyncDot('err');
    // Don't toast on load failure — just show local data silently
    console.warn('GitHub load failed:', e.message);
  }
}

// FILTERS
// ─────────────────────────────────────────
let filterOEM = '', filterStatus = '', filterPriority = '', filterStage = '', filterSegment = '', filterMonth = '', filterLocation = '', searchQ = '';

function filteredLeads() {
  const t = today();
  return leads.filter(l => {
    if (currentTab === 'followup') {
      if (!l.followup) return false;
      return l.followup <= t;
    }
    if (currentTab === 'active') return l.status === 'Active';
    if (currentTab === 'won') return l.status === 'Won';
    if (currentTab === 'lost') return l.status === 'Lost';
    return true;
  }).filter(l => {
    if (filterOEM && l.oem !== filterOEM) return false;
    if (filterStatus && l.status !== filterStatus) return false;
    if (filterPriority && l.priority !== filterPriority) return false;
    if (filterStage && l.stage !== filterStage) return false;
    if (filterSegment && l.segment !== filterSegment) return false;
    if (filterMonth && (l.leadDate||'').slice(0,7) !== filterMonth) return false;
    if (filterLocation && l.city !== filterLocation) return false;
    if (searchQ) {
      const words = searchQ.toLowerCase().trim().split(/\s+/);
      const haystack = [l.company, l.customer, l.phone, l.phone2, l.oem, l.source, l.city, l.machine, l.segment, l.status, l.stage]
        .map(v => (v||'').toLowerCase()).join(' ');
      return words.every(w => haystack.includes(w));
    }
    return true;
  });
}

function renderLeadsList() {
  const container = document.getElementById('leadsListContainer');
  if (!container) { render(); return; }
  const t = today();
  const fl = filteredLeads();

  // Update stats to reflect current filtered view
  const isFiltered = filterOEM || filterStatus || filterSegment || filterMonth || filterLocation || searchQ || currentTab !== 'all';
  const statsBase = isFiltered ? fl : leads;
  const el = id => document.getElementById(id);
  if (el('stat-total')) {
    el('stat-total').textContent = statsBase.length;
    el('stat-total-label').textContent = isFiltered ? 'Filtered' : 'Total';
  }
  if (el('stat-active')) el('stat-active').textContent = statsBase.filter(l=>l.status==='Active').length;
  if (el('stat-overdue')) el('stat-overdue').textContent = statsBase.filter(l=>l.followup && l.followup < t && l.status==='Active').length;
  if (el('stat-won')) el('stat-won').textContent = statsBase.filter(l=>l.status==='Won').length;
  const priorityOrder = {High:0,Medium:1,Low:2,'':3};
  fl.sort((a,b) => {
    const aOv = a.followup && a.followup < t ? -1 : 0;
    const bOv = b.followup && b.followup < t ? -1 : 0;
    if (aOv !== bOv) return aOv - bOv;
    return (priorityOrder[a.priority]||3) - (priorityOrder[b.priority]||3);
  });

  if (fl.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>No leads here</h3><p>Add your first lead or adjust filters</p></div>`;
    return;
  }

  container.innerHTML = fl.map(l => {
    const isOverdue = l.followup && l.followup < t && l.status === 'Active';
    const isToday = l.followup === t;
    const cardClass = isOverdue ? 'overdue' : isToday ? 'due-today' : '';
    let followupLabel = 'No follow-up set', fuClass = 'none';
    if (l.followup) {
      if (isOverdue) { followupLabel = `⚠ Overdue (${fmtDate(l.followup)})`; fuClass = 'overdue'; }
      else if (isToday) { followupLabel = `🔔 Follow-up today`; fuClass = 'due-today'; }
      else { followupLabel = `📅 ${fmtDate(l.followup)}`; fuClass = 'upcoming'; }
    }
    const age = l.leadDate ? daysBetween(l.leadDate, t) : null;
    const statusClass = l.status==='Active'?'status-active':l.status==='Lost'?'status-lost':l.status==='Won'?'status-won':'status-hold';
    const priorityClass = l.priority==='High'?'tag-priority-high':l.priority==='Low'?'tag-priority-low':'tag-priority-medium';
    return `
    <div class="lead-card ${cardClass}" onclick="openDetail('${l.id}')">
      <div class="lead-card-header">
        <div>
          <div class="lead-company">${l.company||'—'}</div>
          <div class="lead-customer">${l.customer||''}${l.city?` · ${l.city}`:''}</div>
        </div>
        <span class="status-badge ${statusClass}">${l.status||'Active'}</span>
      </div>
      <div class="lead-tags">
        ${l.stage?`<span class="tag tag-stage">${l.stage}</span>`:''}
        ${l.segment?`<span class="tag" style="background:#1a1e3a;color:#a0aaff">${l.segment}</span>`:''}
        ${l.priority?`<span class="tag ${priorityClass}">${l.priority}</span>`:''}
        ${l.oem?`<span class="tag tag-oem">${l.oem}</span>`:''}
        ${l.amount?`<span class="tag tag-amount">${fmtAmt(l.amount)}</span>`:''}
        ${l.subvention && l.subvention !== 'None' ? `<span class="tag" style="background:#1a2a20;color:var(--green)">${l.subvention}</span>` : ''}
        ${l.machine?`<span class="tag tag-oem">${l.machine}</span>`:''}
      </div>
      <div class="lead-footer">
        <span class="lead-followup ${fuClass}">${followupLabel}</span>
        <span class="lead-age">${age!==null?`${age}d old`:''}</span>
      </div>
    </div>`;
  }).join('');
}

async function mergeAndPush() {
  setSyncDot('syncing');
  const s = getSettings();
  if (!s.token) { toast('Set up GitHub first', 'error'); return; }
  toast('Merging...', '');
  const filePath = s.filePath || 'leads.json';
  let remoteLeads = [];
  try {
    const data = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/${filePath}`);
    ghFileSHA = data.sha;
    const raw = data.content ? data.content.replace(/\n/g,'') : '';
    if (raw) { try { remoteLeads = JSON.parse(atob(raw)) || []; } catch(e) { remoteLeads = []; } }
  } catch(e) {
    if (!e.message.includes('404')) {
      setSyncDot('err'); toast('Merge failed: ' + e.message, 'error'); return;
    }
  }
  leads = mergeLeads(leads, remoteLeads);
  saveLocal(leads);
  render();
  await saveToGithub();
  toast(`Merged ✓ — ${leads.length} total leads synced`, 'success');
}

function openAddLead() {

async function saveLead() {
  const company = document.getElementById('f_company').value.trim();
  const customer = document.getElementById('f_customer').value.trim();
  if (!company && !customer) { toast('Company or Customer name required', 'error'); return; }

  const lead = {};
  FIELDS.forEach(f => {
    const el = document.getElementById('f_'+f);
    lead[f] = el ? el.value.trim() : '';
  });
  // Auto-set status to Lost when stage is Closed Lost
  if (lead.stage === 'Closed Lost') lead.status = 'Lost';
  lead.id = editingId || uid();
  lead.updatedAt = new Date().toISOString();

  if (editingId) {
    const idx = leads.findIndex(x => x.id === editingId);
    leads[idx] = lead;
  } else {
    leads.unshift(lead);
  }

  saveLocal(leads);
  closeForm();
  render();
  await saveToGithub();
}

const CSV_HEADERS = ['Company','Customer Name','Phone','Alt Phone','Email','City','Segment','Address','Lead Received From','Source Type','OEM Name','Machine Requirement','Loan Amount','Subvention','Priority','Stage','Status','Lead Date','Next Follow-up','Last Contacted','Reason','Notes'];
const CSV_KEYS    = ['company','customer','phone','phone2','email','city','segment','address','source','sourceType','oem','machine','amount','subvention','priority','stage','status','leadDate','followup','lastContact','reason','notes'];

const TEMPLATE_SAMPLE = [

];

  ].join('\n# ,,,,,,,,,,,,,,,,,,,\n');

function parseCSV(text) {
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split(/\r?\n/).filter(l => l.trim() && !l.trim().startsWith('#'));
  if (lines.length < 2) return { headers: [], rows: [] };

  function parseLine(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        result.push(cur.trim()); cur = '';
      } else cur += ch;
    }
    result.push(cur.trim());
    return result;
  }

  const headers = parseLine(lines[0]);
  const rows = lines.slice(1).map(l => parseLine(l));
  return { headers, rows };
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    let text = e.target.result;
    // Clean up common garbled characters from Windows encoding mismatch
    text = text
      .replace(/Ã¢ÂÂ/g, '–').replace(/Ã¢ÂÂ/g, '—')
      .replace(/â€"/g, '–').replace(/â€"/g, '—')
      .replace(/â€˜/g, "'").replace(/â€™/g, "'")
      .replace(/â€œ/g, '"').replace(/â€/g, '"')
      .replace(/Â·/g, '·').replace(/Ãƒ/g, 'A')
      .replace(/[^\x00-\x7F\u00C0-\u024F\u0900-\u097F]/g, ' ') // strip other non-printable junk
      .replace(/  +/g, ' '); // collapse double spaces
    processImportFile(text, file.name);
  };
  // Try without forced encoding first — browser will auto-detect
  reader.readAsText(file);
}

let pendingImport = [];

function processImportFile(text, filename) {
  const { headers, rows } = parseCSV(text);
  if (!headers.length) { toast('Could not read CSV file', 'error'); return; }

  // Map CSV headers to field keys (case-insensitive, flexible)
  const normalize = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
  const normHeaders = CSV_HEADERS.map(normalize);
  const colMap = headers.map(h => {
    const idx = normHeaders.indexOf(normalize(h));
    return idx >= 0 ? CSV_KEYS[idx] : null;
  });

  const existingPhones = new Set(leads.map(l => (l.phone||'').replace(/\D/g,'')).filter(Boolean));

  const parsed = rows.map((row, i) => {
    const lead = {};
    colMap.forEach((key, ci) => { if (key) lead[key] = (row[ci] || '').trim(); });

    // Normalise date fields: accept DD/MM/YYYY → YYYY-MM-DD
    ['leadDate','followup','lastContact'].forEach(k => {
      if (lead[k] && /^\d{2}\/\d{2}\/\d{4}$/.test(lead[k])) {
        const [d,m,y] = lead[k].split('/');
        lead[k] = `${y}-${m}-${d}`;
      }
    });

    const cleanPhone = (lead.phone||'').replace(/\D/g,'');
    const isDup = cleanPhone && existingPhones.has(cleanPhone);
    const hasMin = lead.company || lead.customer || lead.phone;
    return { lead, isDup, hasMin, row: i+2 }; // row+2 for 1-indexed + header
  });

  pendingImport = parsed;
  renderImportPreview(filename, parsed);
  document.getElementById('importOverlay').classList.add('open');
}

function renderImportPreview(filename, parsed) {
  const ok  = parsed.filter(r => r.hasMin && !r.isDup);
  const dup = parsed.filter(r => r.hasMin && r.isDup);
  const err = parsed.filter(r => !r.hasMin);

  const previewRows = parsed.slice(0,50).map(r => {
    const cls = !r.hasMin ? 'import-row-err' : r.isDup ? 'import-row-dup' : 'import-row-ok';
    const flag = !r.hasMin ? '❌' : r.isDup ? '⚠️' : '✅';
    const l = r.lead;
    return `<tr class="${cls}">
      <td>${flag}</td>
      <td>${l.company||'—'}</td>
      <td>${l.customer||'—'}</td>
      <td>${l.phone||'—'}</td>
      <td>${l.oem||'—'}</td>
      <td>${l.machine||'—'}</td>
      <td>${l.stage||'—'}</td>
      <td>${l.status||'—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('importBody').innerHTML = `
    <p style="color:var(--muted);font-size:12px;margin-bottom:10px;">File: <strong style="color:var(--text)">${filename}</strong> · ${parsed.length} rows found</p>
    <div class="import-legend">
      <span class="ok-dot">${ok.length} new leads to import</span>
      <span class="dup-dot">${dup.length} duplicates (phone match)</span>
      <span class="err-dot">${err.length} rows skipped (no name/phone)</span>
    </div>
    <div class="import-scroll" style="margin-top:12px;">
      <table class="import-preview-table">
        <thead><tr><th></th><th>Company</th><th>Customer</th><th>Phone</th><th>OEM</th><th>Machine</th><th>Stage</th><th>Status</th></tr></thead>
        <tbody>${previewRows}</tbody>
      </table>
    </div>
    ${parsed.length > 50 ? `<p style="color:var(--muted);font-size:11px;margin-top:6px;">Showing first 50 rows of ${parsed.length}</p>` : ''}
    <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
      <button class="btn btn-ghost" style="flex:1" onclick="closeImportModal()">Cancel</button>
      ${dup.length > 0 ? `<button class="btn btn-ghost" style="flex:1;color:var(--orange);border-color:var(--orange)" onclick="confirmImport(true)">Import All incl. Duplicates (${ok.length+dup.length})</button>` : ''}
      ${ok.length > 0 ? `<button class="btn btn-primary" style="flex:1" onclick="confirmImport(false)">✅ Import ${ok.length} New Leads</button>` : '<p style="color:var(--muted);font-size:12px;width:100%;text-align:center">No new leads to import.</p>'}
    </div>`;
}

async function confirmImport(includeDups) {

    ? pendingImport.filter(r => r.hasMin)
    : pendingImport.filter(r => r.hasMin && !r.isDup);

  const newLeads = toImport.map(r => ({

async function runDailyBackup() {
  // Just calls the manual backup silently — runs on every app open
  await pushBackupNow(true);
}

async function pushBackupNow(silent = false) {
  const s = getSettings();
  if (!s.token) { if (!silent) toast('Set up GitHub first', 'error'); return; }
  if (!leads.length) { if (!silent) toast('No leads to backup', 'error'); return; }

  const todayStr = today();
  const filePath = `backups/leads_${todayStr}.json`;
  if (!silent) toast('Backing up...', '');
  try {
    // Check if today's backup already exists to get its SHA (for overwrite)
    let existingSHA = null;
    try {
      const existing = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/${filePath}`);
      existingSHA = existing.sha;
    } catch(e) { /* file doesn't exist yet, that's fine */ }

    const content = btoa(unescape(encodeURIComponent(JSON.stringify(leads, null, 2))));
    await ghRequest('PUT', `/repos/${s.owner}/${s.repo}/contents/${filePath}`, {
      message: `Backup – ${todayStr} (${leads.length} leads)`,
      content,
      ...(existingSHA ? { sha: existingSHA } : {})
    });
    localStorage.setItem(LAST_BACKUP_KEY, todayStr);
    if (!silent) toast(`Backup saved ✓ — ${leads.length} leads`, 'success');
    else console.log('Auto backup saved:', filePath);
  } catch(e) {
    if (!silent) toast('Backup failed: ' + e.message, 'error');
    else console.warn('Auto backup failed:', e.message);
  }
}

async function listBackups() {
  const s = getSettings();
  if (!s.token) return [];
  try {
    const data = await ghRequest('GET', `/repos/${s.owner}/${s.repo}/contents/backups`);
    return data
      .filter(f => f.name.startsWith('leads_') && f.name.endsWith('.json'))
      .sort((a,b) => b.name.localeCompare(a.name)) // newest first
      .slice(0, 30); // max 30 backups shown
  } catch(e) { return []; }
}

async function restoreFromBackup(downloadUrl, filename) {
  if (!confirm(`Restore from ${filename}?\n\nThis will REPLACE your current leads with the backup. Your current data will be saved as today's backup first.`)) return;

  // Save current state as today's backup before overwriting
  await runDailyBackup();

  try {
    const res = await fetch(downloadUrl);
    const restored = await res.json();
    if (!Array.isArray(restored)) { toast('Invalid backup file', 'error'); return; }
    leads = restored;
    saveLocal(leads);
    render();
    await saveToGithub();
    toast(`Restored ${leads.length} leads from ${filename} ✓`, 'success');
    document.getElementById('importOverlay').classList.remove('open');
  } catch(e) {
    toast('Restore failed: ' + e.message, 'error');
  }
}

async function openBackupManager() {
  document.getElementById('importBody').innerHTML = `<p style="color:var(--muted);font-size:13px">Loading backups...</p>`;
  document.getElementById('importOverlay').classList.add('open');
  pushModalState();

  const backups = await listBackups();
  if (!backups.length) {
    document.getElementById('importBody').innerHTML = `
      <p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">No backups found yet.<br/>The first backup will be created automatically tonight when you open the app.</p>
      <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="document.getElementById('importOverlay').classList.remove('open')">Close</button>`;
    return;
  }

  const rows = backups.map(f => {
    const dateStr = f.name.replace('leads_','').replace('.json','');
    const [y,m,d] = dateStr.split('-');
    const monthNames = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const label = `${d} ${monthNames[parseInt(m)]} ${y}`;
    const sizekb = (f.size / 1024).toFixed(1);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-size:14px;color:var(--text);font-weight:500">📦 ${label}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${sizekb} KB · ${f.name}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="restoreFromBackup('${f.download_url}','${f.name}')">↩ Restore</button>
    </div>`;
  }).join('');

  document.getElementById('importBody').innerHTML = `
    <p style="color:var(--muted);font-size:12px;margin-bottom:12px">Backups are taken automatically once a day. Tap Restore to roll back to any date.</p>
    <div style="max-height:320px;overflow-y:auto">${rows}</div>
    <button class="btn btn-ghost" style="width:100%;margin-top:14px" onclick="document.getElementById('importOverlay').classList.remove('open')">Close</button>`;
}

// ─────────────────────────────────────────
// BACK BUTTON (History API — prevents swipe-back closing app)
// ─────────────────────────────────────────
function pushModalState() {
  history.pushState({ modal: true }, '');
}

window.addEventListener('popstate', function(e) {
  // If any modal is open, close it instead of navigating away
  if (document.getElementById('formOverlay').classList.contains('open')) {
    closeForm(); return;
  }
  if (document.getElementById('detailOverlay').classList.contains('open')) {
    document.getElementById('detailOverlay').classList.remove('open'); return;
  }
  if (document.getElementById('importOverlay').classList.contains('open')) {
    document.getElementById('importOverlay').classList.remove('open'); return;
  }
  if (document.getElementById('shareOverlay').classList.contains('open')) {
    document.getElementById('shareOverlay').classList.remove('open'); return;
  }
});

// ─────────────────────────────────────────
// START
// ─────────────────────────────────────────
initApp();
</script>
